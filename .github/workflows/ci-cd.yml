name: CI/CD Pipeline

on:
  push:
    branches: ["main"] # Trigger on pushes to main (someone commits from local repo to remote repo)
 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Secrets Presence
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "❌ DOCKERHUB_USERNAME is EMPTY"
            exit 1
          else
            echo "✅ DOCKERHUB_USERNAME is present"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-backend:latest      

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-frontend:latest



  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:                                    #ssh -i <key> <user>@public ip(host)
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}       #ubuntu 
          key: ${{ secrets.EC2_SSH_KEY }}         #private key  bihfwbebsugfjbu
          source: "docker-compose.yml,database/init.sql"
          target: "~/expense-tracker"

      - name: Deploy and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Check and Install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "🐋 Docker not found, installing..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            # Check and Install Docker Compose if missing (V2)
            if ! docker compose version &> /dev/null; then
              echo "🐙 Docker Compose V2 not found, installing plugin..."
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
            fi

            # Ensure Docker is running
            sudo systemctl is-active --quiet docker || sudo systemctl start docker

            cd ~/expense-tracker

            # Create .env file for Docker Compose
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
            echo "DOCKER_IMAGE_TAG=latest" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env

            # Pull new images
            docker compose pull

            # Restart services
            docker compose up -d --remove-orphans
